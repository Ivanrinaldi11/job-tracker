<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>CareerFlow</title>

  <link rel="stylesheet" href="style.css">

  <!-- FONT -->

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

  <!-- SIDEBAR -->

  <aside class="sidebar">

    <div>

      <h2>
        CareerFlow
      </h2>

      <nav>

        <a href="#" class="nav-item">
          Dashboard
        </a>

        <a href="#" class="nav-item">
          Applications
        </a>

        <a href="#" class="nav-item">
          Statistics
        </a>

      </nav>

    </div>

    <!-- LANGUAGE -->

    <div class="language-toggle">

      <button id="pt-btn">
        🇧🇷 PT
      </button>

      <button id="en-btn">
        🌎 EN
      </button>

    </div>

  </aside>

  <!-- MAIN -->

  <main class="main-content">

    <!-- TOPBAR -->

    <header class="topbar">

      <h1 id="title">
        Aplicações de Emprego
      </h1>

      <p id="subtitle">
        Gerencie suas oportunidades de forma organizada
      </p>

    </header>

    <!-- STATS -->

    <section class="stats">

      <div class="stat-card">

        <span id="total-text">
          Total
        </span>

        <h2 id="total-jobs">
          0
        </h2>

      </div>

      <div class="stat-card">

        <span id="interview-text">
          Entrevistas
        </span>

        <h2 id="interview-count">
          0
        </h2>

      </div>

      <div class="stat-card">

        <span id="pending-text">
          Pendentes
        </span>

        <h2 id="pending-count">
          0
        </h2>

      </div>

      <div class="stat-card">

        <span id="rejected-text">
          Rejeitados
        </span>

        <h2 id="rejected-count">
          0
        </h2>

      </div>

    </section>

    <!-- FORM -->

    <section class="form-section">

      <h2 id="form-title">
        Nova Aplicação
      </h2>

      <form id="job-form">

        <input
          type="text"
          id="company"
          placeholder="Empresa"
          required
        >

        <input
          type="text"
          id="position"
          placeholder="Cargo"
          required
        >

        <select id="status">

          <option value="Pending">
            Pendente
          </option>

          <option value="Interview">
            Entrevista
          </option>

          <option value="Rejected">
            Rejeitado
          </option>

        </select>

        <button type="submit" id="submit-btn">
          Adicionar
        </button>

      </form>

    </section>

    <!-- SEARCH -->

    <section class="search-section">

      <input
        type="text"
        id="search"
        placeholder="Pesquisar aplicações..."
      >

    </section>

    <!-- EMPTY -->

    <div class="empty-state" id="empty-state">

      <h3 id="empty-title">
        Nenhuma aplicação cadastrada
      </h3>

      <p id="empty-text">
        Comece adicionando sua primeira oportunidade.
      </p>

    </div>

    <!-- JOBS -->

    <section class="jobs-container" id="jobs-container">

    </section>

  </main>

  <!-- TOAST -->

  <div id="toast"></div>

  <script src="script.js"></script>

</body>

</html>
